<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timesheet Dashboard</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h2>Employee Timesheets</h2>

    <div class="controls">
        <label>Start Date</label>
        <input type="date" id="startDate">
        <label>End Date</label>
        <input type="date" id="endDate">
        <button onclick="fetchTimesheets()">Fetch Timesheets</button>
        <button onclick="showDefaulters()">Timesheet Defaulters</button>
    </div>

    <div id="defaulters"></div>

    <table id="timesheetTable">
        <thead>
            <tr>
                <th>User</th>
                <th>Project</th>
                <th>Activity</th>
                <th>Description</th>
                <th>Duration</th>
                <th>Date</th>
            </tr>
        </thead>
        <tbody>
        </tbody>
    </table>    

    <script src="script.js"></script>

</body>
</html>
